<div class="flex flex-wrap justify-center gap-8 bg-white p-2">
  @for (item of items; track $index) {
    <p-card pAnimateOnScroll enterClass="animate-enter fade-in-10 slide-in-from-t-20 animate-duration-1000" leaveClass="animate-leave fade-out-0" class="flex flex-col border border-primary-200 shadow-lg justify-center items-center max-w-80 rounded-2xl p-8 gap-4">
      <h1>{{item.title}}</h1>
      <p-button [label]="item.label" fluid (onClick)="navigateTo(item.target!)"></p-button>
    </p-card>
  }
</div>

@if (isForm && selectedEntity) {
  <form [formGroup]="entityForm">
    <div class="grid">
      <div class="field col-12 md:col-6">
        <app-label description="Nome" [abstractControl]="getField('name')"></app-label>
        <input type="text" pInputText id="name" inputId="name" formControlName="name" fluid placeholder="Digite o nome da classe" autocomplete="off">
      </div>
      <div class="field col-12 md:col-6">
        <app-label description="Descrição" [abstractControl]="getField('description')"></app-label>
        <input type="text" pInputText id="description" inputId="description" formControlName="description" fluid placeholder="Digite a descrição da classe" autocomplete="off">
      </div>
    </div>
  </form>

  <div class="fluid">
    <p-table [value]="members" [columns]="columns" size="small" stripedRows rowHover class="text-xs md:text-sm lg:text-base" paginator [rows]="20" [rowsPerPageOptions]="[5, 10, 20, 50, 100, 200]">
      <ng-template #caption>
        <p-toolbar>
          <ng-template #start>
            <p-button size="small" severity="info" label="Alunos" (onClick)="onChangeMembers(students, studentColumns)"></p-button>
          </ng-template>
          <ng-template #end>
            <p-button size="small" severity="help" label="Professores" (onClick)="onChangeMembers(teachers, teacherColumns)"></p-button>
          </ng-template>
        </p-toolbar>
        <div class="fluid my-2">
          <p-button fluid severity="warn" label="Remanejar" (onClick)="openTransferClassDialog()"></p-button>
        </div>
      </ng-template>
      <ng-template #header let-columns>
        <tr>
          @for (column of columns; track $index) {
            <th>{{column.label}}</th>
          }
          <!-- <th>Ação</th> -->
        </tr>
      </ng-template>
      <ng-template #body let-result let-columns="columns">
        <tr>
          @for (column of columns; track $index) {
            <td>{{getValue(result, column)}}</td>
          }
          <!-- <td>
            <p-button size="small" severity="info" label="Remanejar" class="text-xs" (onClick)="openTransferClassDialog(result)"></p-button>
          </td> -->
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td>Nenhum resultado foi encontrado</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
}

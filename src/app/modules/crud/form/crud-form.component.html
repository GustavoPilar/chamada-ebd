<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="fluid border-round overflow-visible bg-white">
    <div #form>
    </div>
    <div class="w-full flex justify-content-between align-items-center p-2">
        <p-button variant="text" label="Cancelar" severity="danger" icon="pi pi-undo" iconPos="right" (onClick)="cancelForm()"></p-button>
        <p-button label="Salvar" icon="pi pi-send" iconPos="right" [disabled]="!canSave()" (onClick)="saveEntity()"></p-button>
    </div>
</div>

<div class="fluid">
  <!-- Start Header -->
  <div class="grid">
    <div class="col-12 text-center">
      <h1 class="text-4xl">Escola Bíblica Dominical</h1>
      <div class="mt-3">
        <p class="text-base">Gerenciamento de:</p>
        <p-carousel [value]="['Alunos', 'Aniversários', 'Classes', 'Chamadas', 'Relatórios']" [numVisible]="3" [circular]="true" [responsiveOptions]="[ { breakpoint: '1400px', numVisible: 2, numScroll: 1 },{ breakpoint: '1199px',numVisible: 3, numScroll: 1 }, { breakpoint: '767px', numVisible: 2, numScroll: 1 }, { breakpoint: '575px', numVisible: 1, numScroll: 1 } ]" [autoplayInterval]="5000" class="mt-4">
          <ng-template #item let-item>
            {{item}}
          </ng-template>
        </p-carousel>
      </div>
    </div>
  </div>
  <!-- End Header -->
  <hr>
  <!-- Start Body -->
  <div class="flex flex-wrap justify-center gap-8 p-2 mt-4">
    @for (item of items; track $index) {
      <p-card [style]="{overflow: 'hidden' }" class="w-80 gap-4">
        <ng-template #header>
            <img [src]="'assets/images/' + getLower(item.title!) + '.jpg'" class="w-full" [style]="{'height':'200px'}">
        </ng-template>
        <ng-template #title> {{item.title}} </ng-template>
        <ng-template #content>
          <p>{{item.label}}</p>
        </ng-template>
        <ng-template #footer>
            <div class="mt-1">
                <p-button label="Acessar" fluid (onClick)="navigateTo(item.target!)"></p-button>
            </div>
        </ng-template>
      </p-card>
    }
  </div>
  <!-- End Body -->
</div>

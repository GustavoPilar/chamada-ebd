<p-toast></p-toast>

@if(form) {
  <div class="fluid">
    <form [formGroup]="form" class="fluid p-3 grid">
      <div class="field lg:col-6 col-12">
        <label for="name">Filtre pelo nome</label>
        <p-iconfield>
          <p-inputicon class="pi pi-user"></p-inputicon>
          <input type="text" pInputText inputId="name" id="name" class="w-full" placeholder="Filtre pelo nome" formControlName="name" [disabled]="!users.length" />
        </p-iconfield>
      </div>
      <div class="field lg:col-6 col-12">
        <label for="age">Filtre pela idade</label>
        <p-iconfield>
          <p-inputicon class="pi pi-sort-numeric-up-alt"></p-inputicon>
          <p-inputNumber inputId="age" id="age" class="w-full" placeholder="Filtre pela idade" formControlName="age" [min]="0" [max]="120" [disabled]="!users.length" />
        </p-iconfield>
      </div>
      <div class="field lg:col-6 col-12">
        <p-button label="Filtrar" icon="pi pi-search" (onClick)="filter()" [disabled]="!users.length" fluid="true"></p-button>
      </div>
      <div class="field lg:col-6 col-12">
        <p-button label="Salvar" icon="pi pi-check" severity="success" (onClick)="save()" [disabled]="!users.length" fluid="true"></p-button>
      </div>
      <div class="field lg:col-6 col-12" [hidden]="!users.length">
        <p>Usuários encontrados: {{userFiltered.length}}</p>
      </div>
    </form>
  </div>
}

@if (users && !users.length) {
  <div class="fluid text-center">
    <h1>Nenhum usuário foi encontrado...</h1>
  </div>
}
@else if (users && users.length){
  @for (user of userFiltered; track $index) {
  <div class="flex justify-content-between align-items-center shadow-3 p-2 border-round-xl hover:shadow-5 cursor-pointer my-3" (dblclick)="addOrRemoveUser(user)">
    <div class="w-full p-2">
      <p>{{user.code}} - Nome: {{user.name}} - Idade: {{user.age}}</p>
    </div>
    <div>
      <p-button [label]="!user.added ? 'adicionar' : 'Remover'" [icon]="!user.added ? 'pi pi-plus' : 'pi pi-times'" [severity]="!user.added ? 'primary' : 'danger'" (onClick)="addOrRemoveUser(user)"></p-button>
    </div>
  </div>
}
}

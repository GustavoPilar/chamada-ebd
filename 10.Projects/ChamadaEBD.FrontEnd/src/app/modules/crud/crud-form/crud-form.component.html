<p-toast></p-toast>
<p-confirmdialog></p-confirmdialog>
<div class="w-10 mx-auto shadow-2 border-round overflow-hidden">
  <div class="p-1 bg-primary">
    <h1>Formulário</h1>
  </div>
  <ng-container #form></ng-container>
  <div class="flex justify-content-between align-items-center">
    <div class="p-2">
      <p-button label="Cancelar e voltar" icon="pi pi-undo" variant="text" severity="danger" (onClick)="cancelForm()"></p-button>
    </div>
    <div class="p-2">
      <p-button label="Salvar" icon="pi pi-check" severity="success" [disabled]="!canSave()" (onClick)="saveForm()"></p-button>
    </div>
  </div>
</div>

<p-confirmDialog></p-confirmDialog>
@if(!loading) {
    <p-table [value]="entities" [columns]="crudBaseComponent.GetColumns()" [size]="'small'">
        <ng-template #caption>
            <p-toolbar>
                <ng-template #start>
                    <p-button icon="pi pi-plus" severity="primary" label="adicionar"></p-button>
                </ng-template>
            </p-toolbar>
        </ng-template>
        <ng-template #header let-columns>
            <tr>
                @for (col of columns; track $index) {
                    <th class="text-center">{{col.label}}</th>
                }
                <th class="text-center">Ações</th>
            </tr>
        </ng-template>
        <ng-template #body let-rowData let-columns="columns">
            <tr>
                @for (col of columns; track $index) {
                    <td class="text-center">
                        @if (checkBooleanType(col.type)) {
                            @if (rowData[col.name]) {
                                <p-button [rounded]="true" icon="pi pi-check" severity="success" disabled="true"></p-button>
                            }
                            @else {
                                <p-button [rounded]="true" icon="pi pi-times" severity="danger" disabled="true"></p-button>
                            }
                        }
                        @else {
                            {{rowData[col.name]}}
                        }
                    </td>
                }
                <td>
                    <div class="flex justify-content-evenly">
                        <p-button icon="pi pi-pencil" severity="warn"></p-button>
                        <p-button icon="pi pi-trash" severity="danger" (onClick)="confirmationDelete(rowData)"></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
}

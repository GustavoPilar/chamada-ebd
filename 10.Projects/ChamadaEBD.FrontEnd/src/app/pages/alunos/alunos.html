<div class="card">
    <p-table [value]="students">
        <ng-template #caption>
            <p-toolbar>
                <ng-template #start>
                    <p-button icon="pi pi-plus"></p-button>
                </ng-template>
            </p-toolbar>
        </ng-template>
        <ng-template #header>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Sala</th>
                <th>Ativo?</th>
                <th>Ação</th>
            </tr>
        </ng-template>
        <ng-template #body let-result>
            <tr>
                <td>{{result.name}}</td>
                <td>{{result.age}}</td>
                <td>{{result.room}}</td>
                <td>
                    @if (result.active) {
                        <p-button icon="pi pi-check" severity="success" [disabled]="true"></p-button>
                    }
                    @else {
                        <p-button icon="pi pi-times" severity="danger" [disabled]="true"></p-button>
                    }
                </td>
                <td>
                    <div class="flex justify-content-evenly">
                        <p-button icon="pi pi-pencil" severity="warn"></p-button>
                        <p-button icon="pi pi-trash" severity="danger"></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

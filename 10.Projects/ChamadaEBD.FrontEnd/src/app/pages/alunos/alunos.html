<div class="card">
    <p-table [value]="students">
        <ng-template #caption>
            <p-toolbar>
                <ng-template #start>
                    <p-button icon="pi pi-plus" (onClick)="showForm(null)"></p-button>
                </ng-template>
            </p-toolbar>
        </ng-template>
        <ng-template #header>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Sala</th>
                <th>Ativo?</th>
                <th>Ação</th>
            </tr>
        </ng-template>
        <ng-template #body let-result>
            <tr>
                <td>{{result.name}}</td>
                <td>{{result.age}}</td>
                <td>{{result.room.code}}</td>
                <td>
                    @if (result.active) {
                        <p-button icon="pi pi-check" severity="success" [disabled]="true"></p-button>
                    }
                    @else {
                        <p-button icon="pi pi-times" severity="danger" [disabled]="true"></p-button>
                    }
                </td>
                <td>
                    <div class="flex justify-content-evenly">
                        <p-button icon="pi pi-pencil" severity="warn" (onClick)="showForm(result)"></p-button>
                        <p-button icon="pi pi-trash" severity="danger"></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
    @if (visible) {
        <p-dialog [modal]="true" [visible]="visible" [closeOnEscape]="false" [closable]="false" class="form-dialog" [draggable]="false" [style]="{'width' : '50%', 'height': '50%'}">
            <form [formGroup]="entityForm">
                <h2 class="border-bottom-3">{{formDescription}}</h2>
                <div class="grid">
                    <div class="field lg:col-6 md:col-12 sm:col-12">
                        <label for="name">Nome</label>
                        <input pInputText type="text" id="name" placeholder="Nome do aluno" formControlName="name" class="w-full"/>
                    </div>
                    <div class="field lg:col-6 md:col-12 sm:col-12">
                        <label for="age">Idade</label>
                        <p-inputNumber [min]="0" [max]="120" [showButtons]="true" suffix=" anos" class="w-full" formControlName="age"></p-inputNumber>
                    </div>
                    <div class="field lg:col-6 md:col-12 sm:col-12">
                        <label for="room">Sala</label>
                        <p-select formControlName="room" [options]="rooms" optionLabel="code" dataKey="id" placeholder="Selecione a sala" class="w-full" [showClear]="true" [editable]="true" />
                    </div>
                </div>
            </form>
            <ng-template #footer>
                <div class="flex justify-content-between w-full">
                    <p-button [variant]="'text'" label="Cancelar e voltar" icon="pi pi-undo" severity="danger" (onClick)="closeForm()"></p-button>
                    <p-button label="Salvar" severity="success"></p-button>
                </div>
            </ng-template>
        </p-dialog>
    }
</div>

<div class="card">
    <p-table [value]="rooms">
        <ng-template #caption>
            <p-toolbar>
                <ng-template #start>
                    <p-button icon="pi pi-plus"></p-button>
                </ng-template>
            </p-toolbar>
        </ng-template>
        <ng-template #header>
            <tr>
                <th class="text-center">Sala</th>
                <th class="text-center">Descrição</th>
                <th class="text-center">Professor</th>
                <th class="text-center">Ação</th>
            </tr>
        </ng-template>
        <ng-template #body let-result>
            <tr>
                <td>{{result.code}}</td>
                <td>{{result.description}}</td>
                <td>{{result.teacher}}</td>
                <td>
                    <div class="flex justify-content-evenly">
                        <p-button icon="pi pi-pencil"></p-button>
                        <p-button icon="pi pi-trash"></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

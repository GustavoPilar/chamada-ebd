<p-menubar [model]="items">
    <ng-template #start>
        <div>
            <h1>Chamada EBD</h1>
        </div>
    </ng-template>
    <ng-template #item let-item let-root="root">
        <p-button [label]="item.label" [icon]="item.icon" [style]="{'color': 'white'}" class="mx-2"></p-button>
    </ng-template>
</p-menubar>

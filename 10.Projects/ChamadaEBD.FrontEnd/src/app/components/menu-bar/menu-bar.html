<p-menubar [model]="items">
    <ng-template #start>
        <div>
            <h1>Chamada EBD</h1>
        </div>
    </ng-template>
    <ng-template #item let-item let-root="root">
        <p-button [label]="item.label" [icon]="item.icon"></p-button>
    </ng-template>
    <ng-template #end>
        <p-button icon="pi pi-sun" (onClick)="toggleDarkMode()"/>
    </ng-template>
</p-menubar>
